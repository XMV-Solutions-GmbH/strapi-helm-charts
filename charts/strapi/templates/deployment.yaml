apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "strapi.fullname" . }}
  labels:
    {{- include "strapi.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "strapi.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "strapi.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "strapi.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 1337
              protocol: TCP
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          env:
            - name: NODE_ENV
              value: {{ .Values.strapi.nodeEnv | quote }}
            - name: DATABASE_CLIENT
              value: {{ .Values.database.client | quote }}
            - name: DATABASE_HOST
              value: {{ .Values.database.host | quote }}
            - name: DATABASE_PORT
              value: {{ .Values.database.port | quote }}
            - name: DATABASE_NAME
              value: {{ .Values.database.name | quote }}
            - name: DATABASE_USERNAME
              value: {{ .Values.database.username | quote }}
            - name: DATABASE_SSL
              value: {{ .Values.database.ssl | quote }}
            - name: DATABASE_PASSWORD
              {{- if .Values.database.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.existingSecret }}
                  key: DATABASE_PASSWORD
              {{- else }}
              value: {{ .Values.database.password | quote }}
              {{- end }}
            {{- if .Values.strapi.existingSecret }}
            - name: APP_KEYS
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.strapi.existingSecret }}
                  key: APP_KEYS
            - name: API_TOKEN_SALT
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.strapi.existingSecret }}
                  key: API_TOKEN_SALT
            - name: ADMIN_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.strapi.existingSecret }}
                  key: ADMIN_JWT_SECRET
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.strapi.existingSecret }}
                  key: JWT_SECRET
            - name: TRANSFER_TOKEN_SALT
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.strapi.existingSecret }}
                  key: TRANSFER_TOKEN_SALT
            {{- else }}
            - name: APP_KEYS
              value: {{ .Values.strapi.appKeys | quote }}
            - name: API_TOKEN_SALT
              value: {{ .Values.strapi.apiTokenSalt | quote }}
            - name: ADMIN_JWT_SECRET
              value: {{ .Values.strapi.adminJwtSecret | quote }}
            - name: JWT_SECRET
              value: {{ .Values.strapi.jwtSecret | quote }}
            - name: TRANSFER_TOKEN_SALT
              value: {{ .Values.strapi.transferTokenSalt | quote }}
            {{- end }}
            {{- if eq .Values.uploads.provider "aws-s3" }}
            - name: AWS_ACCESS_KEY_ID
              {{- if .Values.uploads.s3.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.uploads.s3.existingSecret }}
                  key: S3_ACCESS_KEY_ID
              {{- else }}
              value: {{ .Values.uploads.s3.accessKeyId | quote }}
              {{- end }}
            - name: AWS_SECRET_ACCESS_KEY
              {{- if .Values.uploads.s3.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.uploads.s3.existingSecret }}
                  key: S3_SECRET_ACCESS_KEY
              {{- else }}
              value: {{ .Values.uploads.s3.secretAccessKey | quote }}
              {{- end }}
            - name: AWS_REGION
              value: {{ .Values.uploads.s3.region | quote }}
            - name: AWS_BUCKET
              value: {{ .Values.uploads.s3.bucket | quote }}
            {{- if .Values.uploads.s3.endpoint }}
            - name: AWS_ENDPOINT
              value: {{ .Values.uploads.s3.endpoint | quote }}
            {{- end }}
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.extraEnvFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if and .Values.persistence.enabled (eq .Values.uploads.provider "local") }}
          volumeMounts:
            - name: uploads
              mountPath: /opt/app/public/uploads
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- if and .Values.persistence.enabled (eq .Values.uploads.provider "local") }}
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: {{ include "strapi.fullname" . }}-uploads
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
