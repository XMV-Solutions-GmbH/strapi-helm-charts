# Default values for the Strapi Helm chart.
# Designed for production deployment on Kubernetes with:
#   - External PostgreSQL (CNPG or any Postgres-compatible endpoint)
#   - S3-compatible media storage (MinIO, AWS S3, Hetzner Object Storage)
#   - Ingress with TLS
#   - Multi-arch image (linux/amd64 + linux/arm64)

replicaCount: 1

image:
  # The official strapi/strapi Docker Hub image is v3-only — strapi/strapi-docker
  # was archived in 2022 (see https://github.com/strapi/strapi-docker README) and
  # v4+ Docker images live outside the strapi/ org. Until an official multi-arch
  # v5 image is published, this chart defaults to a community-built multi-arch
  # build maintained at github.com/XMV-Solutions-GmbH/strapi-helm-charts.
  #
  # Override `repository` + `tag` to point at your own Strapi image if you
  # build your own — see CONTRIBUTING.md "Building your own image".
  repository: ghcr.io/xmv-solutions-gmbh/strapi
  pullPolicy: IfNotPresent
  # The community build publishes `latest` + per-commit `sha-<short>` tags.
  # Pin to a specific commit SHA for production rollouts; `latest` is fine for
  # development. Once a proper Strapi-version-tagged release pipeline lands,
  # this default will become Chart.appVersion-derived.
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podSecurityContext: {}

securityContext:
  runAsNonRoot: true
  runAsUser: 1000

service:
  type: ClusterIP
  port: 1337

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: cms.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: strapi-tls
      hosts:
        - cms.example.com

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80

nodeSelector: {}
tolerations: []
affinity: {}

# ---------------------------------------------------------------------------
# Strapi application configuration
# ---------------------------------------------------------------------------
strapi:
  # App keys — generate with: node -e "console.log(require('crypto').randomBytes(32).toString('base64'))"
  # Provide as a secret reference (see existingSecret) rather than plain text.
  appKeys: ""
  apiTokenSalt: ""
  adminJwtSecret: ""
  jwtSecret: ""
  transferTokenSalt: ""

  # Reference an existing Kubernetes secret containing the above keys.
  # The secret must have keys: APP_KEYS, API_TOKEN_SALT, ADMIN_JWT_SECRET,
  # JWT_SECRET, TRANSFER_TOKEN_SALT
  existingSecret: ""

  # Node environment
  nodeEnv: production

# ---------------------------------------------------------------------------
# Database (external PostgreSQL)
# ---------------------------------------------------------------------------
database:
  client: postgres
  host: ""          # e.g. strapi-rw.cnpg-system.svc.cluster.local
  port: 5432
  name: strapi
  username: strapi
  ssl: false
  # Provide password via existingSecret (key: DATABASE_PASSWORD) rather than plain text.
  password: ""
  existingSecret: ""

# ---------------------------------------------------------------------------
# Media / uploads storage (S3-compatible)
# ---------------------------------------------------------------------------
uploads:
  provider: aws-s3   # or: local (PVC), @strapi/provider-upload-local
  # S3 / MinIO configuration
  s3:
    accessKeyId: ""
    secretAccessKey: ""
    region: ""               # e.g. nbg1 for Hetzner Object Storage
    bucket: strapi-media
    endpoint: ""             # Leave empty for AWS S3; set for MinIO/Hetzner
    # Provide credentials via existingSecret (keys: S3_ACCESS_KEY_ID, S3_SECRET_ACCESS_KEY)
    existingSecret: ""

# ---------------------------------------------------------------------------
# Persistence (only relevant when uploads.provider = local)
# ---------------------------------------------------------------------------
persistence:
  enabled: false
  storageClass: ""
  size: 10Gi
  accessMode: ReadWriteOnce
  # Where the uploads volume is mounted inside the container.
  # Default matches the WORKDIR of the chart's default image
  # (ghcr.io/xmv-solutions-gmbh/strapi → /app). If you override `image`
  # with a Strapi build produced by strapi-community/strapi-tool-dockerize
  # (WORKDIR /opt/app) or any other convention, set this to match:
  #   helm install ... --set persistence.mountPath=/opt/app/public/uploads
  mountPath: /app/public/uploads

# ---------------------------------------------------------------------------
# Liveness / readiness probes
# ---------------------------------------------------------------------------
livenessProbe:
  httpGet:
    path: /_health
    port: 1337
  initialDelaySeconds: 60
  periodSeconds: 30
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /_health
    port: 1337
  initialDelaySeconds: 30
  periodSeconds: 10
  failureThreshold: 3

# ---------------------------------------------------------------------------
# Single Sign-On for the admin panel (via strapi-plugin-sso)
# ---------------------------------------------------------------------------
# Off by default — Strapi Community Edition has no built-in admin SSO,
# so we ship the community plugin in the image and toggle it via
# STRAPI_SSO_ENABLED. When `sso.enabled: true`, populate the Azure-AD
# block with the Entra App-Registration details. Use `existingSecret`
# (recommended) to keep secrets out of git.
sso:
  enabled: false

  azureAd:
    # OIDC callback Strapi exposes; must match the redirect URI you set
    # on the Entra App Registration.
    redirectUri: "https://cms.example.com/strapi-plugin-sso/azuread/callback"

    # `openid profile email` is the standard Strapi-plugin-sso scope
    # set — it gets the email + name fields the plugin needs to
    # find/create a Strapi user.
    scope: "openid profile email"

    # Option A — read from an existing Secret. The Secret must have
    # keys: AZUREAD_TENANT_ID, AZUREAD_OAUTH_CLIENT_ID,
    # AZUREAD_OAUTH_CLIENT_SECRET. Recommended for production.
    existingSecret: ""

    # Option B — values in chart (only for local dev / testing).
    tenantId: ""
    clientId: ""
    clientSecret: ""

# ---------------------------------------------------------------------------
# Bootstrap super-admin (env-driven, idempotent)
# ---------------------------------------------------------------------------
# Provisions a strapi-super-admin user with the given email on first
# boot if no user with that email exists. The throwaway password is
# discarded — log in via SSO (preferred) or use the forgot-password
# flow. Idempotent: re-deploys are a no-op once the user exists.
bootstrapSuperadmin:
  email: ""
  firstname: ""
  lastname: ""

# ---------------------------------------------------------------------------
# Extra environment variables (advanced overrides)
# ---------------------------------------------------------------------------
extraEnv: []
# - name: STRAPI_DISABLE_UPDATE_NOTIFICATION
#   value: "true"

extraEnvFrom: []
# - secretRef:
#     name: my-additional-secret
