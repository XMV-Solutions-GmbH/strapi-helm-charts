name: build-image

# Builds the multi-arch Strapi v5 base image at image/ and publishes it to
# ghcr.io/xmv-solutions-gmbh/strapi. The chart's default `image.repository`
# points at the resulting package; the package is linked to this repo so it
# inherits public visibility.

on:
  push:
    branches: [main]
    paths:
      - "image/**"
      - ".github/workflows/build-image.yaml"
  pull_request:
    branches: [main]
    paths:
      - "image/**"
      - ".github/workflows/build-image.yaml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: xmv-solutions-gmbh/strapi

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
          labels: |
            org.opencontainers.image.source=https://github.com/XMV-Solutions-GmbH/strapi-helm-charts
            org.opencontainers.image.description=Production-ready Strapi v5 multi-arch base image (linux/amd64 + linux/arm64). Companion to the strapi Helm chart in this repo.
            org.opencontainers.image.licenses=MIT OR Apache-2.0

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./image
          file: ./image/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
