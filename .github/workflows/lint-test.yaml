name: lint-test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: chart-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.3

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          check-latest: true

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2.6.1

      - name: helm lint (all charts)
        run: |
          for chart in charts/*/; do
            helm lint "$chart"
          done

      - name: ct lint (changed charts vs main)
        run: ct lint --target-branch ${{ github.event.repository.default_branch }} --all

  unittest:
    name: helm-unittest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.3

      - name: Install helm-unittest plugin
        run: helm plugin install https://github.com/helm-unittest/helm-unittest --version 0.7.2

      - name: Run unit tests + write JUnit report
        run: |
          mkdir -p test-output
          helm unittest charts/strapi --output-type JUnit --output-file test-output/junit.xml
          # Also keep a human-readable summary in the artifact bundle
          helm unittest charts/strapi | tee test-output/summary.txt

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: helm-unittest-report
          path: test-output/

  kubeconform:
    name: kubeconform
    runs-on: ubuntu-latest
    needs: [lint, unittest]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.3

      - name: Install kubeconform
        run: |
          curl -sSLO https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz
          tar -xf kubeconform-linux-amd64.tar.gz
          sudo mv kubeconform /usr/local/bin/

      - name: Render chart + validate against K8s schema (default values)
        run: |
          helm template test-release charts/strapi \
            --set database.host=postgres.example.com \
            --set strapi.appKeys=dummy \
            --set strapi.apiTokenSalt=dummy \
            --set strapi.adminJwtSecret=dummy \
            --set strapi.jwtSecret=dummy \
            --set strapi.transferTokenSalt=dummy \
            --set uploads.s3.accessKeyId=dummy \
            --set uploads.s3.secretAccessKey=dummy \
            --set uploads.s3.region=eu \
            > /tmp/rendered.yaml
          kubeconform -strict -summary -kubernetes-version 1.31.0 -schema-location default /tmp/rendered.yaml

      - name: Render chart + validate (local persistence variant)
        run: |
          helm template test-release charts/strapi \
            --set database.host=postgres.example.com \
            --set strapi.existingSecret=strapi-keys \
            --set uploads.provider=local \
            --set persistence.enabled=true \
            > /tmp/rendered.yaml
          kubeconform -strict -summary -kubernetes-version 1.31.0 -schema-location default /tmp/rendered.yaml

      - name: Render chart + validate (custom WORKDIR mountPath override)
        run: |
          helm template test-release charts/strapi \
            --set database.host=postgres.example.com \
            --set strapi.existingSecret=strapi-keys \
            --set uploads.provider=local \
            --set persistence.enabled=true \
            --set persistence.mountPath=/app/public/uploads \
            > /tmp/rendered.yaml
          kubeconform -strict -summary -kubernetes-version 1.31.0 -schema-location default /tmp/rendered.yaml

      - name: Render chart + validate (ingress disabled)
        run: |
          helm template test-release charts/strapi \
            --set database.host=postgres.example.com \
            --set strapi.existingSecret=strapi-keys \
            --set ingress.enabled=false \
            > /tmp/rendered.yaml
          kubeconform -strict -summary -kubernetes-version 1.31.0 -schema-location default /tmp/rendered.yaml

  install:
    name: chart-install (kind)
    runs-on: ubuntu-latest
    needs: [lint, unittest]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.3

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          check-latest: true

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2.6.1

      - name: List changed charts
        id: list-changed
        run: |
          changed=$(ct list-changed --target-branch ${{ github.event.repository.default_branch }})
          if [[ -n "$changed" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create kind cluster
        if: steps.list-changed.outputs.changed == 'true'
        uses: helm/kind-action@v1.10.0

      - name: ct install (kind smoke-test, uses charts/strapi/ci/*.yaml)
        if: steps.list-changed.outputs.changed == 'true'
        run: ct install --target-branch ${{ github.event.repository.default_branch }}
