name: Release charts

on:
  push:
    branches: [main]

jobs:
  release:
    permissions:
      contents: write
      packages: write
      pages: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.6.0
        with:
          skip_existing: true
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

      - name: Trigger ArtifactHub re-index
        env:
          ARTIFACTHUB_API_KEY_ID: ${{ secrets.ARTIFACTHUB_API_KEY_ID }}
          ARTIFACTHUB_API_KEY_SECRET: ${{ secrets.ARTIFACTHUB_API_KEY_SECRET }}
        run: |
          status=$(curl -fsSL -o /tmp/ah_get.json -w "%{http_code}" \
            -H "X-API-KEY-ID: ${ARTIFACTHUB_API_KEY_ID}" \
            -H "X-API-KEY-SECRET: ${ARTIFACTHUB_API_KEY_SECRET}" \
            "https://artifacthub.io/api/v1/repositories/strapi-xmv")
          if [[ "$status" != "200" ]]; then
            echo "GET failed (HTTP $status) — skipping re-index trigger" && exit 0
          fi
          status=$(curl -fsSL -o /dev/null -w "%{http_code}" \
            -X PUT \
            -H "Content-Type: application/json" \
            -H "X-API-KEY-ID: ${ARTIFACTHUB_API_KEY_ID}" \
            -H "X-API-KEY-SECRET: ${ARTIFACTHUB_API_KEY_SECRET}" \
            -d @/tmp/ah_get.json \
            "https://artifacthub.io/api/v1/repositories/strapi-xmv")
          echo "ArtifactHub re-index triggered (HTTP $status)"
