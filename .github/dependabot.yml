# SPDX-License-Identifier: MIT OR Apache-2.0
#
# Weekly dependency-bump PRs from Dependabot.
#
# - github-actions: catches CVEs / version bumps in workflow actions
#   (actions/checkout, azure/setup-helm, helm/chart-testing-action, …).
#   The lint-test.yaml + build-image.yaml + release.yaml workflows together
#   reference ~15 third-party actions, so this is meaningful coverage.
# - npm: bumps the Strapi base image's deps under image/. The
#   `package-lock.json` was committed in the npm-supply-chain hardening
#   pass (sec/npm-ignore-scripts), so Dependabot can resolve cleanly
#   against it. Combined with the Dockerfile's `npm ci --ignore-scripts`
#   posture, postinstall hooks from a compromised package can't execute
#   at build time.
# - docker: tracks the base-image bump (`FROM node:22-alpine` in
#   image/Dockerfile) so security CVEs in the upstream Node image
#   surface as PRs.
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10

  - package-ecosystem: "npm"
    directory: "/image"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    # Peer-dep constraints come from upstream Strapi (@strapi/strapi).
    # Bumping these ahead of an upstream Strapi major release breaks
    # the build — Strapi 5.x pins react ^18, typescript ^5, etc.
    # When upstream Strapi releases a new major that consumes the
    # next ecosystem versions, the bumps come transitively via
    # @strapi/strapi. Major-version PRs on these would just sit red.
    ignore:
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-router-dom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
      - dependency-name: "better-sqlite3"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "docker"
    directory: "/image"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    # Node base image follows what upstream Strapi supports. Major
    # bumps (node 22-alpine → 26-alpine) need to wait for upstream
    # Strapi to declare engine compatibility.
    ignore:
      - dependency-name: "node"
        update-types: ["version-update:semver-major"]
