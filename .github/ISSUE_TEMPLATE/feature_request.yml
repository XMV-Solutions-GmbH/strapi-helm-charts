name: Feature Request
description: Suggest a new feature or improvement for the Strapi Helm chart
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        For major changes (new chart structure, breaking value changes) consider
        opening a discussion first.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case or limitation you're hitting.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How should this be implemented? Example values.yaml additions welcome.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds you've tried?
