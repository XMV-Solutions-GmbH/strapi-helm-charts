# SPDX-License-Identifier: MIT OR Apache-2.0
# ==============================================================================
# Repository Configuration
# ==============================================================================
#
# This file mirrors the schema of oss-project-template/repo.ini so the same
# .github/gh-scripts/ helpers (assign-repo-to-team, setup-branch-protection)
# work against this repo without modification.
# ==============================================================================

# ------------------------------------------------------------------------------
# Organisation & Repository
# ------------------------------------------------------------------------------
ORG="XMV-Solutions-GmbH"
REPO="strapi-helm-charts"
BRANCH="main"

# ------------------------------------------------------------------------------
# Team & Access
# ------------------------------------------------------------------------------
TEAM_SLUG="open-source"
EXTRA_USERS=""
EXTRA_APPS=""

# ------------------------------------------------------------------------------
# Branch Protection
# ------------------------------------------------------------------------------
REQUIRED_APPROVALS="0"
REQUIRE_CODEOWNER_REVIEWS="true"
DISMISS_STALE_REVIEWS="true"
ENFORCE_ADMINS="true"

# Required status checks — must match the job names in
# .github/workflows/lint-test.yaml exactly.
STATUS_CHECKS="chart-lint,helm-unittest,kubeconform,chart-install (kind)"

# ------------------------------------------------------------------------------
# Contact Information
# ------------------------------------------------------------------------------
ORG_NAME="XMV Solutions GmbH"
CONTACT_EMAIL="oss@xmv.de"
WEBSITE_URL="https://xmv.de/en/oss/"

# ------------------------------------------------------------------------------
# Project Metadata
# ------------------------------------------------------------------------------
PROJECT_NAME="Strapi Helm Charts"
PROJECT_DESCRIPTION="Helm chart for self-hosted Strapi v5 on Kubernetes (multi-arch, ARM64-tested)"
COPYRIGHT_YEAR="2026"

# ------------------------------------------------------------------------------
# Package Ecosystem
# ------------------------------------------------------------------------------
# Helm doesn't fit the language list; "other" keeps tooling assumptions off.
PRIMARY_ECOSYSTEM="other"
PACKAGE_NAME="strapi"

# ------------------------------------------------------------------------------
# External Services
# ------------------------------------------------------------------------------
# Helm charts don't have line-coverage. We surface helm-unittest pass-count
# via the workflow's JUnit report artifact instead; see README badges.
CODECOV_TOKEN_SECRET=""
REGISTRY_TOKEN_SECRET=""
